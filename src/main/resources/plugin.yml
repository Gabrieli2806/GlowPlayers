name: GlowPlayers
version: '${version}'
main: com.g2806.glowplayers.GlowPlayersPlugin
api-version: '1.21'
description: "Players get colored glow effects by join order and can toggle their own glow with a command."
author: Gabrieli2806
commands:
  glow:
    description: Toggle your colored glow effect.
    usage: /glow [on|off|toggle|status]
    permission: glowplayers.use
permissions:
  glowplayers.use:
    description: Lets players manage their own glow effect.
    default: true